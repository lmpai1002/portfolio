<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Beam analysis diagram</title>
  <desc id="desc">Simply supported beam with distributed loading, shear diagram, and bending moment diagram.</desc>
  <rect width="1600" height="900" fill="#f5f6f4"/>

  <g stroke="#d6dcdd" stroke-width="2">
    <line x1="160" y1="155" x2="1440" y2="155"/>
    <line x1="160" y1="470" x2="1440" y2="470"/>
    <line x1="160" y1="705" x2="1440" y2="705"/>
  </g>

  <g stroke="#0d1b2a" stroke-linecap="round" stroke-linejoin="round">
    <line x1="210" y1="300" x2="1390" y2="300" stroke-width="18"/>
    <path d="M280 320 L230 400 H330 Z" fill="#486276" stroke="none"/>
    <path d="M1320 320 L1270 400 H1370 Z" fill="#486276" stroke="none"/>
    <circle cx="1290" cy="418" r="12" fill="#486276" stroke="none"/>
    <circle cx="1350" cy="418" r="12" fill="#486276" stroke="none"/>
  </g>

  <g stroke="#a94b4b" stroke-width="8" stroke-linecap="round">
    <line x1="500" y1="190" x2="500" y2="270"/>
    <line x1="650" y1="190" x2="650" y2="270"/>
    <line x1="800" y1="190" x2="800" y2="270"/>
    <line x1="950" y1="190" x2="950" y2="270"/>
    <line x1="1100" y1="190" x2="1100" y2="270"/>
  </g>
  <g fill="#a94b4b">
    <path d="M500 290 L478 252 H522 Z"/>
    <path d="M650 290 L628 252 H672 Z"/>
    <path d="M800 290 L778 252 H822 Z"/>
    <path d="M950 290 L928 252 H972 Z"/>
    <path d="M1100 290 L1078 252 H1122 Z"/>
  </g>

  <path d="M210 470 L500 470 L500 535 L1100 410 L1100 470 L1390 470"
        fill="none" stroke="#3aa6a1" stroke-width="12" stroke-linejoin="round"/>
  <path d="M210 705 C400 705 510 610 800 590 C1090 610 1200 705 1390 705"
        fill="none" stroke="#d99a2b" stroke-width="13" stroke-linecap="round"/>

  <g fill="#0d1b2a">
    <circle cx="210" cy="470" r="10"/>
    <circle cx="1390" cy="470" r="10"/>
    <circle cx="210" cy="705" r="10"/>
    <circle cx="1390" cy="705" r="10"/>
  </g>
</svg>
