<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">NACA 2414 airfoil geometry</title>
  <desc id="desc">Airfoil profile with upper and lower surfaces, chord line, and mean camber line.</desc>
  <rect width="1600" height="900" fill="#f5f6f4"/>

  <g stroke="#d6dcdd" stroke-width="2">
    <line x1="170" y1="450" x2="1430" y2="450"/>
    <line x1="260" y1="175" x2="260" y2="725"/>
    <line x1="550" y1="175" x2="550" y2="725" stroke-dasharray="12 14"/>
    <line x1="840" y1="175" x2="840" y2="725" stroke-dasharray="12 14"/>
    <line x1="1130" y1="175" x2="1130" y2="725" stroke-dasharray="12 14"/>
  </g>

  <path d="M220 455
           C350 330 590 275 850 300
           C1090 325 1295 390 1390 446
           C1280 472 1080 505 840 520
           C590 532 345 505 220 455 Z"
        fill="#d8efed" stroke="#0d1b2a" stroke-width="8" stroke-linejoin="round"/>

  <path d="M220 455
           C455 410 710 395 940 408
           C1145 418 1300 438 1390 446"
        fill="none" stroke="#d99a2b" stroke-width="8" stroke-dasharray="20 16" stroke-linecap="round"/>

  <line x1="220" y1="570" x2="1390" y2="570" stroke="#486276" stroke-width="4"/>
  <path d="M220 570 L250 552 V588 Z" fill="#486276"/>
  <path d="M1390 570 L1360 552 V588 Z" fill="#486276"/>

  <line x1="690" y1="300" x2="690" y2="520" stroke="#3aa6a1" stroke-width="4"/>
  <path d="M690 300 L672 330 H708 Z" fill="#3aa6a1"/>
  <path d="M690 520 L672 490 H708 Z" fill="#3aa6a1"/>

  <circle cx="220" cy="455" r="11" fill="#a94b4b"/>
  <circle cx="1390" cy="446" r="11" fill="#a94b4b"/>
</svg>
