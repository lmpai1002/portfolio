<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Numerical engineering tools visual</title>
  <desc id="desc">A computational engineering visual with a robot path, beam diagrams, and a NACA airfoil plot.</desc>
